<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryLens - Payment Successful</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .checkmark {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      border: 4px solid #4CAF50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: #4CAF50;
    }
    h1 { color: #333; margin-bottom: 15px; }
    p { color: #666; margin-bottom: 30px; line-height: 1.6; }
    .status { color: #4CAF50; font-weight: bold; margin-bottom: 20px; }
    button {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #5568d3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✓</div>
    <h1>Payment Successful!</h1>
    <p class="status" id="status">Verifying your upgrade...</p>
    <p>Thank you for upgrading to MemoryLens Pro. Your account is now active.</p>
    <button onclick="closeWindow()">Close & Return to Extension</button>
  </div>

  <script>
    async function verifyPayment() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      if (!sessionId) {
        document.getElementById('status').textContent = 'No session found.';
        return;
      }

      try {
        const response = await chrome.runtime.sendMessage({
          type: 'STRIPE_VERIFY_SESSION',
          payload: { sessionId },
        });

        if (response.ok) {
          document.getElementById('status').textContent = '✓ Your Pro plan is active!';
        } else {
          document.getElementById('status').textContent = 'Verification failed: ' + response.error;
        }
      } catch (e) {
        console.error('Verification error:', e);
        document.getElementById('status').textContent = 'Error verifying payment.';
      }
    }

    function closeWindow() {
      window.close();
    }

    // Verify on load
    verifyPayment();
  </script>
</body>
</html>
