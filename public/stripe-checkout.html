<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryLens - Upgrade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 { color: #333; margin-bottom: 20px; font-size: 28px; }
    p { color: #666; margin-bottom: 30px; line-height: 1.6; }
    #stripe-container { margin: 30px 0; }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #5568d3; }
    .loading { display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Upgrade to Pro</h1>
    <p>Unlock unlimited pages, cloud sync, and advanced analytics.</p>
    <div id="stripe-container"></div>
    <button id="checkout-btn">Continue to Checkout</button>
    <div class="loading" id="loading">Processing...</div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    const stripe = Stripe('pk_test_YOUR_KEY_HERE'); // Replace with actual key
    const checkoutBtn = document.getElementById('checkout-btn');

    checkoutBtn.addEventListener('click', async () => {
      checkoutBtn.disabled = true;
      checkoutBtn.textContent = 'Loading...';

      try {
        const response = await fetch('http://localhost:3001/stripe/create-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });

        const { sessionId } = await response.json();
        const { error } = await stripe.redirectToCheckout({ sessionId });
        
        if (error) {
          alert('Payment error: ' + error.message);
          checkoutBtn.disabled = false;
          checkoutBtn.textContent = 'Continue to Checkout';
        }
      } catch (e) {
        console.error('Checkout error:', e);
        alert('Failed to initiate checkout');
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = 'Continue to Checkout';
      }
    });
  </script>
</body>
</html>
