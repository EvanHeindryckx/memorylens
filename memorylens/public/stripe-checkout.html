<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryLens Pro — Paiement</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f11;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #1a1a1f;
      border-radius: 20px;
      border: 1px solid #2a2a35;
      max-width: 420px;
      width: 100%;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #9ca3af; margin-bottom: 24px; line-height: 1.6; }
    #card-element {
      padding: 12px;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      background: #0f0f11;
      color: white;
      margin-bottom: 16px;
    }
    .StripeElement {
      color: white;
    }
    .StripeElement--focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.1);
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #7c3aed;
      color: white;
      margin-top: 8px;
    }
    button:hover:not(:disabled) { background: #6d28d9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }
    .error.show { display: block; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .price { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .plan-name { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💳</div>
    <h1>Upgrader vers Pro</h1>
    <div class="plan-name">MemoryLens Pro</div>
    <div class="price">9,99 €<span style="font-size: 14px; color: #9ca3af;">/mois</span></div>
    <p>Synchronisation cloud • Stockage illimité • Recherche avancée</p>

    <div id="error" class="error"></div>

    <form id="payment-form">
      <div id="card-element"></div>
      <button id="submit-btn" type="submit">
        <span id="btn-text">Payer</span>
      </button>
    </form>

    <p style="font-size: 12px; color: #6b7280; margin-top: 12px;">
      Paiement sécurisé par Stripe<br>
      <span id="status-text"></span>
    </p>
  </div>

  <script>
    const stripe = Stripe('{STRIPE_PUBLIC_KEY}');
    const elements = stripe.elements();
    const cardElement = elements.create('card', {
      style: {
        base: {
          color: '#ffffff',
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI"',
          fontSize: '14px',
          '::placeholder': { color: '#6b7280' }
        }
      }
    });
    cardElement.mount('#card-element');

    const form = document.getElementById('payment-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorDiv = document.getElementById('error');
    const statusText = document.getElementById('status-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;

      // Récupère le clientSecret depuis le backend
      try {
        const userRes = await fetch('http://localhost:3001/auth/current-user');
        const user = await userRes.json();
        const userId = user.uid;

        const setupRes = await fetch('http://localhost:3001/stripe/setup-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId })
        });

        if (!setupRes.ok) {
          throw new Error('Erreur serveur');
        }

        const { clientSecret } = await setupRes.json();

        // Confirme le paiement avec Stripe
        const result = await stripe.confirmCardSetup(clientSecret, {
          payment_method: { card: cardElement }
        });

        if (result.error) {
          errorDiv.textContent = result.error.message;
          errorDiv.classList.add('show');
          submitBtn.disabled = false;
        } else {
          // Succès
          statusText.textContent = 'Création de l\'abonnement...';
          
          // Crée l'abonnement
          const subRes = await fetch('http://localhost:3001/stripe/create-subscription', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              userId,
              paymentMethodId: result.setupIntent.payment_method
            })
          });

          const subData = await subRes.json();

          if (subRes.ok) {
            // Met à jour le billing dans le storage
            await chrome.storage.sync.set({
              billing: {
                plan: 'pro',
                stripeCustomerId: subData.customerId,
                stripeSubscriptionId: subData.subscriptionId,
                currentPeriodEnd: subData.currentPeriodEnd
              }
            });

            statusText.textContent = '✅ Pro activé ! Fermeture...';
            setTimeout(() => window.close(), 1500);
          } else {
            throw new Error(subData.error || 'Erreur création abonnement');
          }
        }
      } catch (err) {
        console.error('Erreur:', err);
        errorDiv.textContent = err.message || 'Erreur. Réessayez.';
        errorDiv.classList.add('show');
        submitBtn.disabled = false;
      }
    });

    cardElement.addEventListener('change', (e) => {
      if (e.error) {
        errorDiv.textContent = e.error.message;
        errorDiv.classList.add('show');
      } else {
        errorDiv.classList.remove('show');
      }
    });
  </script>
</body>
</html>
