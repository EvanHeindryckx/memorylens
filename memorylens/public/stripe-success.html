<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>MemoryLens Pro — Paiement confirmé</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f11;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #1a1a1f;
      border-radius: 20px;
      border: 1px solid #2a2a35;
      max-width: 420px;
      width: 90%;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #9ca3af; line-height: 1.6; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a35;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { margin-top: 16px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Bienvenue dans MemoryLens Pro !</h1>
    <p>Votre paiement a été confirmé.<br>Activation de votre abonnement en cours…</p>
    <div class="spinner"></div>
    <div class="status" id="status">Vérification en cours…</div>
  </div>
  <script src="stripe-success.js"></script>
</body>
</html>
